# Cloud Build config for sameer-automations (sameerautomations.com)
# Region: us-east4 (non-negotiable)
# NOTE: --set-secrets=N8N_LEAD_WEBHOOK_URL=n8n-lead-webhook-url:latest is intentionally
# omitted. The secret `n8n-lead-webhook-url` does not currently exist in this project.
# Create it via `gcloud secrets create n8n-lead-webhook-url --data-file=...` and add
# the flag back to the deploy step when the n8n lead webhook is wired up.

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-east4-docker.pkg.dev/$PROJECT_ID/website/sameer-automations:$COMMIT_SHA
      - -t
      - us-east4-docker.pkg.dev/$PROJECT_ID/website/sameer-automations:latest
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-east4-docker.pkg.dev/$PROJECT_ID/website/sameer-automations:$COMMIT_SHA

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-east4-docker.pkg.dev/$PROJECT_ID/website/sameer-automations:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - sameer-automations
      - --image=us-east4-docker.pkg.dev/$PROJECT_ID/website/sameer-automations:$COMMIT_SHA
      - --region=us-east4
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=60s
      - --set-env-vars=NEXT_PUBLIC_PLAUSIBLE_DOMAIN=sameerautomations.com

images:
  - us-east4-docker.pkg.dev/$PROJECT_ID/website/sameer-automations:$COMMIT_SHA
  - us-east4-docker.pkg.dev/$PROJECT_ID/website/sameer-automations:latest

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
