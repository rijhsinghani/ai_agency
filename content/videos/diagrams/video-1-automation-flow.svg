<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500">
  <defs>
    <!-- Dot grid pattern (subtle) -->
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#A8A29E" opacity="0.08"/>
    </pattern>

    <!-- Grain texture filter -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Mesh gradient: purple left -->
    <radialGradient id="meshPurple" cx="20%" cy="50%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>

    <!-- Mesh gradient: cyan right -->
    <radialGradient id="meshCyan" cx="80%" cy="50%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4DD9E8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4DD9E8" stop-opacity="0"/>
    </radialGradient>

    <!-- Node glow filter -->
    <filter id="nodeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Soft glow filter for accent circles -->
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Logo glow filter -->
    <filter id="logoGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.302  0 0 0 0 0.851  0 0 0 0 0.910  0 0 0 0.8 0" result="cyan"/>
      <feMerge>
        <feMergeNode in="cyan"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Connector gradient: cyan to purple -->
    <linearGradient id="connectorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4DD9E8"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>

    <!-- Accent bar gradient -->
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="#4DD9E8"/>
    </linearGradient>

    <!-- Lit-edge gradient for cards (purple) -->
    <linearGradient id="litEdgePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#7B2FBE"/>
      <stop offset="70%" stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Lit-edge gradient for result card (warm accent) -->
    <linearGradient id="litEdgeWarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#D4A574"/>
      <stop offset="70%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="500" fill="#1A1A1A"/>

  <!-- Dot grid overlay -->
  <rect width="1600" height="500" fill="url(#dotGrid)"/>

  <!-- Mesh gradient layers -->
  <rect width="1600" height="500" fill="url(#meshPurple)"/>
  <rect width="1600" height="500" fill="url(#meshCyan)"/>

  <!-- Grain texture overlay -->
  <rect width="1600" height="500" filter="url(#grain)" opacity="0.04"/>

  <!-- ============================================================ -->
  <!-- TITLE AREA -->
  <!-- ============================================================ -->
  <text x="800" y="48" text-anchor="middle" font-family="'Roc Grotesk', 'Outfit', sans-serif" font-size="32" font-weight="bold" fill="#EDE9E3">Missed Call Text-Back: How It Works</text>
  <!-- Accent bar -->
  <rect x="700" y="58" width="200" height="3" rx="1.5" fill="url(#accentBar)"/>

  <!-- ============================================================ -->
  <!-- ARCH DECORATIONS: small glowing accent circles -->
  <!-- ============================================================ -->
  <circle cx="40" cy="40" r="7" fill="#7B2FBE" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="1560" cy="40" r="7" fill="#4DD9E8" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="580" cy="430" r="6" fill="#4DD9E8" opacity="0.25" filter="url(#softGlow)"/>
  <circle cx="1020" cy="110" r="8" fill="#7B2FBE" opacity="0.2" filter="url(#softGlow)"/>
  <circle cx="1560" cy="460" r="7" fill="#4DD9E8" opacity="0.25" filter="url(#softGlow)"/>

  <!-- ============================================================ -->
  <!-- STEP NODES (centered text within cards) -->
  <!-- Card centers: 145, 395, 645, 895, 1145 -->
  <!-- Card width: 210, so center x = left + 105 -->
  <!-- ============================================================ -->

  <!-- === STEP 1: Missed Call === -->
  <ellipse cx="145" cy="220" rx="85" ry="55" fill="#7B2FBE" opacity="0.08" filter="url(#nodeGlow)"/>
  <rect x="40" y="150" width="210" height="140" rx="14" fill="#161616" filter="url(#cardShadow)"/>
  <rect x="40" y="150" width="210" height="140" rx="14" fill="#161616"/>
  <rect x="40" y="150" width="210" height="1" rx="0.5" fill="url(#litEdgePurple)"/>
  <text x="56" y="172" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7B2FBE" opacity="0.4">01</text>
  <!-- Icon: Phone handset (thin-stroke, cyan) -->
  <g transform="translate(145, 185)">
    <path d="M-12 -8 C-12 -8 -10 -4 -8 0 C-6 4 -4 6 -2 6 L2 6 C4 6 6 4 8 0 C10 -4 12 -8 12 -8" fill="none" stroke="#4DD9E8" stroke-width="2" stroke-linecap="round"/>
    <path d="M-12 -8 C-14 -6 -14 -2 -12 2 M12 -8 C14 -6 14 -2 12 2" fill="none" stroke="#4DD9E8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="-12" x2="6" y2="-12" stroke="#4DD9E8" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Title (centered, uppercase) -->
  <text x="145" y="220" text-anchor="middle" font-family="'Roc Grotesk', 'Outfit', sans-serif" font-size="15" font-weight="bold" fill="#EDE9E3" letter-spacing="0.05em">MISSED CALL</text>
  <!-- Subtitle (centered) -->
  <text x="145" y="240" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E">Incoming call —</text>
  <text x="145" y="256" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E">you're on a job</text>

  <!-- === STEP 2: Auto-Text Fires === -->
  <ellipse cx="395" cy="220" rx="85" ry="55" fill="#7B2FBE" opacity="0.08" filter="url(#nodeGlow)"/>
  <rect x="290" y="150" width="210" height="140" rx="14" fill="#161616" filter="url(#cardShadow)"/>
  <rect x="290" y="150" width="210" height="140" rx="14" fill="#161616"/>
  <rect x="290" y="150" width="210" height="1" rx="0.5" fill="url(#litEdgePurple)"/>
  <text x="306" y="172" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7B2FBE" opacity="0.4">02</text>
  <!-- Icon: Lightning bolt (thin-stroke, cyan) -->
  <g transform="translate(395, 185)">
    <path d="M-2 -14 L-6 -2 L0 -2 L-2 14 L8 -2 L2 -2 L6 -14 Z" fill="none" stroke="#4DD9E8" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <text x="395" y="220" text-anchor="middle" font-family="'Roc Grotesk', 'Outfit', sans-serif" font-size="15" font-weight="bold" fill="#EDE9E3" letter-spacing="0.05em">AUTO-TEXT FIRES</text>
  <text x="395" y="240" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E">Text sent in</text>
  <text x="395" y="256" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E">30 seconds</text>

  <!-- === STEP 3: Prospect Replies === -->
  <ellipse cx="645" cy="220" rx="85" ry="55" fill="#7B2FBE" opacity="0.08" filter="url(#nodeGlow)"/>
  <rect x="540" y="150" width="210" height="140" rx="14" fill="#161616" filter="url(#cardShadow)"/>
  <rect x="540" y="150" width="210" height="140" rx="14" fill="#161616"/>
  <rect x="540" y="150" width="210" height="1" rx="0.5" fill="url(#litEdgePurple)"/>
  <text x="556" y="172" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7B2FBE" opacity="0.4">03</text>
  <!-- Icon: Chat bubble with lines (thin-stroke, cyan) -->
  <g transform="translate(645, 185)">
    <path d="M-10 -10 L10 -10 C12 -10 12 -10 12 -8 L12 4 C12 6 12 6 10 6 L2 6 L-2 12 L-4 6 L-10 6 C-12 6 -12 6 -12 4 L-12 -8 C-12 -10 -12 -10 -10 -10 Z" fill="none" stroke="#4DD9E8" stroke-width="2" stroke-linejoin="round"/>
    <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#4DD9E8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="3" y2="0" stroke="#4DD9E8" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="645" y="220" text-anchor="middle" font-family="'Roc Grotesk', 'Outfit', sans-serif" font-size="15" font-weight="bold" fill="#EDE9E3" letter-spacing="0.05em">PROSPECT REPLIES</text>
  <text x="645" y="240" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E">Lead shares</text>
  <text x="645" y="256" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E">details</text>

  <!-- === STEP 4: You Get Notified === -->
  <ellipse cx="895" cy="220" rx="85" ry="55" fill="#7B2FBE" opacity="0.08" filter="url(#nodeGlow)"/>
  <rect x="790" y="150" width="210" height="140" rx="14" fill="#161616" filter="url(#cardShadow)"/>
  <rect x="790" y="150" width="210" height="140" rx="14" fill="#161616"/>
  <rect x="790" y="150" width="210" height="1" rx="0.5" fill="url(#litEdgePurple)"/>
  <text x="806" y="172" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7B2FBE" opacity="0.4">04</text>
  <!-- Icon: Bell outline (thin-stroke, cyan) -->
  <g transform="translate(895, 185)">
    <path d="M-8 4 C-8 4 -8 -4 -4 -8 C-2 -10 2 -10 4 -8 C8 -4 8 4 8 4 L-8 4 Z" fill="none" stroke="#4DD9E8" stroke-width="2" stroke-linejoin="round"/>
    <line x1="-10" y1="4" x2="10" y2="4" stroke="#4DD9E8" stroke-width="2" stroke-linecap="round"/>
    <path d="M-2 6 C-2 8 2 8 2 6" fill="none" stroke="#4DD9E8" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="895" y="220" text-anchor="middle" font-family="'Roc Grotesk', 'Outfit', sans-serif" font-size="15" font-weight="bold" fill="#EDE9E3" letter-spacing="0.05em">YOU GET NOTIFIED</text>
  <text x="895" y="240" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E">Alert on</text>
  <text x="895" y="256" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E">your phone</text>

  <!-- === STEP 5: Follow-Up + Booked (Warm Accent) === -->
  <ellipse cx="1145" cy="220" rx="85" ry="55" fill="#7B2FBE" opacity="0.08" filter="url(#nodeGlow)"/>
  <rect x="1040" y="150" width="210" height="140" rx="14" fill="#161616" filter="url(#cardShadow)"/>
  <rect x="1040" y="150" width="210" height="140" rx="14" fill="#161616"/>
  <rect x="1040" y="150" width="210" height="1" rx="0.5" fill="url(#litEdgeWarm)"/>
  <text x="1056" y="172" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7B2FBE" opacity="0.4">05</text>
  <!-- Icon: Checkmark (thin-stroke, warm accent) -->
  <g transform="translate(1145, 185)">
    <path d="M-8 0 L-3 6 L8 -8" fill="none" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1145" y="220" text-anchor="middle" font-family="'Roc Grotesk', 'Outfit', sans-serif" font-size="15" font-weight="bold" fill="#EDE9E3" letter-spacing="0.05em">FOLLOW-UP + BOOKED</text>
  <text x="1145" y="240" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E">Personal follow-up</text>
  <text x="1145" y="256" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E">&#x2192; booked</text>

  <!-- ============================================================ -->
  <!-- CONNECTORS: S-curves with terminal dots -->
  <!-- ============================================================ -->

  <!-- Connector 1→2 -->
  <circle cx="250" cy="220" r="4" fill="#4DD9E8"/>
  <path d="M254 220 C280 220 264 220 290 220" fill="none" stroke="url(#connectorGrad)" stroke-width="2"/>
  <circle cx="290" cy="220" r="4" fill="#7B2FBE"/>

  <!-- Connector 2→3 -->
  <circle cx="500" cy="220" r="4" fill="#4DD9E8"/>
  <path d="M504 220 C520 210 524 230 540 220" fill="none" stroke="url(#connectorGrad)" stroke-width="2"/>
  <circle cx="540" cy="220" r="4" fill="#7B2FBE"/>

  <!-- Connector 3→4 -->
  <circle cx="750" cy="220" r="4" fill="#4DD9E8"/>
  <path d="M754 220 C770 210 774 230 790 220" fill="none" stroke="url(#connectorGrad)" stroke-width="2"/>
  <circle cx="790" cy="220" r="4" fill="#7B2FBE"/>

  <!-- Connector 4→5 -->
  <circle cx="1000" cy="220" r="4" fill="#4DD9E8"/>
  <path d="M1004 220 C1020 210 1024 230 1040 220" fill="none" stroke="url(#connectorGrad)" stroke-width="2"/>
  <circle cx="1040" cy="220" r="4" fill="#D4A574"/>

  <!-- ============================================================ -->
  <!-- TIMING ANNOTATIONS -->
  <!-- ============================================================ -->
  <text x="290" y="330" text-anchor="start" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="14" fill="#4DD9E8">30 seconds</text>
  <text x="290" y="350" text-anchor="start" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="12" fill="#A8A29E" opacity="0.5">vs. 2&#x2013;6 hours without automation</text>

  <!-- ============================================================ -->
  <!-- RESULT CALLOUT BOX (compact, proportional to step cards) -->
  <!-- ============================================================ -->
  <ellipse cx="1400" cy="340" rx="80" ry="25" fill="#D4A574" opacity="0.06" filter="url(#nodeGlow)"/>
  <rect x="1310" y="315" width="180" height="50" rx="10" fill="#161616" filter="url(#cardShadow)"/>
  <rect x="1310" y="315" width="180" height="50" rx="10" fill="#161616"/>
  <rect x="1310" y="315" width="180" height="1" rx="0.5" fill="url(#litEdgeWarm)"/>
  <text x="1400" y="337" text-anchor="middle" font-family="'Roc Grotesk', 'Outfit', sans-serif" font-size="13" font-weight="bold" fill="#D4A574">$500&#x2013;$5,000+ / month</text>
  <text x="1400" y="355" text-anchor="middle" font-family="'DM Sans', 'Gilroy', sans-serif" font-size="10" fill="#A8A29E" opacity="0.7">One-time setup &#xB7; works 24/7</text>

  <!-- ============================================================ -->
  <!-- LOGO (bottom-left, discrete) -->
  <!-- ============================================================ -->
  <g transform="translate(20, 420) scale(0.55)" opacity="0.25">
    <!-- S-wave bridge -->
    <path
      d="M 80 20
         C 40 20, 20 20, 20 40
         C 20 60, 80 40, 80 60
         C 80 80, 60 80, 20 80"
      stroke="#FFFFFF"
      stroke-width="8"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Input node -->
    <circle cx="80" cy="20" r="6" fill="#FFFFFF" filter="url(#logoGlow)"/>
    <circle cx="80" cy="20" r="2" fill="#4DD9E8" opacity="0.85"/>
    <!-- Output node -->
    <circle cx="20" cy="80" r="6" fill="#FFFFFF" filter="url(#logoGlow)"/>
    <circle cx="20" cy="80" r="2" fill="#4DD9E8" opacity="0.85"/>
  </g>

</svg>
