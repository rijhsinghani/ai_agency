<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Instagram Profile — Sameer Rijhsinghani (Direction C)</title>
    <link rel="stylesheet" href="colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        min-height: 100vh;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          "Gilroy",
          -apple-system,
          system-ui,
          sans-serif;
        color: #f5f5f3;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 48px 24px;
        background:
          radial-gradient(
            ellipse 600px 400px at 20% 10%,
            rgba(123, 47, 190, 0.08),
            transparent 60%
          ),
          radial-gradient(
            ellipse 500px 300px at 85% 80%,
            rgba(77, 217, 232, 0.04),
            transparent 60%
          ),
          #0a0a0a;
      }
      .page {
        display: flex;
        gap: 64px;
        align-items: flex-start;
        max-width: 1200px;
        width: 100%;
      }
      .meta {
        flex: 1;
        padding-top: 40px;
        position: sticky;
        top: 48px;
      }
      .eyebrow {
        font-size: 11px;
        font-weight: 600;
        color: #7b2fbe;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .eyebrow::before {
        content: "";
        display: block;
        width: 24px;
        height: 1.5px;
        background: currentColor;
      }
      h1.title {
        font-family: "Roc Grotesk Wide", "Roc Grotesk", sans-serif;
        font-weight: 700;
        font-size: 44px;
        line-height: 1.02;
        letter-spacing: -0.02em;
        color: #f5f5f3;
        margin: 0 0 18px;
      }
      h1.title .accent {
        color: #7b2fbe;
      }
      .lede {
        font-size: 15px;
        line-height: 1.6;
        color: rgba(245, 245, 243, 0.62);
        max-width: 420px;
        margin-bottom: 28px;
      }
      .spec {
        border-top: 1px solid rgba(245, 245, 243, 0.08);
        padding-top: 20px;
      }
      .spec-row {
        display: flex;
        gap: 16px;
        padding: 10px 0;
        font-size: 13px;
        border-bottom: 1px solid rgba(245, 245, 243, 0.06);
      }
      .spec-row:last-child {
        border-bottom: none;
      }
      .spec-key {
        flex: 0 0 110px;
        color: rgba(245, 245, 243, 0.45);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-size: 11px;
        padding-top: 2px;
      }
      .spec-val {
        flex: 1;
        color: #f5f5f3;
        line-height: 1.5;
      }
      .swatches {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .swatch {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px 6px 6px;
        border: 1px solid rgba(245, 245, 243, 0.08);
        border-radius: 999px;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        color: rgba(245, 245, 243, 0.7);
      }
      .swatch .dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
      }
      .phone-col {
        flex: 0 0 423px;
      }
      .phone-shell {
        width: 423px;
        padding: 14px;
        border-radius: 54px;
        background: #050505;
        box-shadow:
          0 40px 120px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.04),
          inset 0 0 0 2px rgba(255, 255, 255, 0.02);
        position: relative;
      }
      .phone-screen {
        width: 100%;
        border-radius: 40px;
        overflow: hidden;
        background: #0e0e0e;
        position: relative;
      }
      .dynamic-island {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 35px;
        border-radius: 22px;
        background: #000;
        z-index: 50;
      }
      .caption {
        margin-top: 20px;
        text-align: center;
        font-size: 11px;
        color: rgba(245, 245, 243, 0.4);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="profile-cell.jsx"></script>
    <script type="text/babel" src="profile-header.jsx"></script>
    <script type="text/babel">
      const GRID_CELLS = [
        {
          kind: "dark-card",
          headline: "THE AI OPERATOR STACK",
          accent: "STACK",
        },
        {
          kind: "reel",
          headline: "WHY FOUNDERS BURN OUT",
          accent: "BURN",
          plays: "24.1K",
          photoSrc: "assets/photos/reel-burn-out.jpg",
        },
        {
          kind: "dark-card",
          headline: "ONE PERSON. FULL AGENCY.",
          accent: "ONE",
        },
        {
          kind: "reel",
          headline: "THE FOLLOW-UP PROBLEM",
          accent: "PROBLEM",
          plays: "18.7K",
          photoSrc: "assets/photos/reel-follow-up.jpg",
        },
        {
          kind: "lifestyle",
          headline: "",
          accent: "",
          photoSrc: "assets/photos/lifestyle.jpg",
        },
        {
          kind: "reel",
          headline: "NOT AN AGENCY",
          accent: "NOT",
          plays: "31.2K",
          photoSrc: "assets/photos/reel-not-agency.jpg",
        },
        {
          kind: "light-card",
          headline: "WHY I ONLY TAKE 4 CLIENTS",
          accent: "4",
        },
        {
          kind: "reel",
          headline: "STOP DOING THIS MANUALLY",
          accent: "STOP",
          plays: "9.6K",
          photoSrc: "assets/photos/reel-stop-manual.jpg",
        },
        { kind: "diagram", headline: "", accent: "" },
      ];

      // Direction C — Wide display, Dain Walker DNA
      const TYPE_KIT_C = {
        fontFamily: "'Roc Grotesk Wide', 'Roc Grotesk', sans-serif",
        fontWeight: 700,
        letterSpacing: "0em",
        lineHeight: 1.0,
        textTransform: "uppercase",
        sizeScale: 0.82,
      };

      function InstagramGrid({ typeKit }) {
        return (
          <div
            style={{
              display: "grid",
              gridTemplateColumns: "repeat(3, 1fr)",
              gap: 2,
              background: "#0a0a0a",
            }}
          >
            {GRID_CELLS.map((cfg, i) => (
              <div
                key={i}
                style={{
                  aspectRatio: "4/5",
                  width: "100%",
                  minWidth: 0,
                  overflow: "hidden",
                  background: "#0a0a0a",
                }}
              >
                <GridCell config={cfg} typeKit={typeKit} />
              </div>
            ))}
          </div>
        );
      }

      function InstagramProfile() {
        return (
          <div
            style={{
              width: 393,
              background: "#0E0E0E",
              position: "relative",
              fontFamily: "-apple-system, system-ui, sans-serif",
            }}
          >
            {/* iOS status bar */}
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                padding: "14px 28px 4px",
                color: "#F5F5F3",
                fontSize: 15,
                fontWeight: 600,
              }}
            >
              <span>9:41</span>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <svg width="17" height="11" viewBox="0 0 17 11" fill="#F5F5F3">
                  <rect x="0" y="6" width="3" height="5" rx="0.5" />
                  <rect x="4.5" y="4" width="3" height="7" rx="0.5" />
                  <rect x="9" y="2" width="3" height="9" rx="0.5" />
                  <rect x="13.5" y="0" width="3" height="11" rx="0.5" />
                </svg>
                <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
                  <rect
                    x="0.5"
                    y="0.5"
                    width="21"
                    height="11"
                    rx="2.5"
                    stroke="#F5F5F3"
                    strokeOpacity="0.5"
                  />
                  <rect
                    x="2"
                    y="2"
                    width="18"
                    height="8"
                    rx="1.5"
                    fill="#F5F5F3"
                  />
                  <rect
                    x="22.5"
                    y="4"
                    width="1.5"
                    height="4"
                    rx="0.3"
                    fill="#F5F5F3"
                    opacity="0.5"
                  />
                </svg>
              </div>
            </div>
            <ProfileHeader typeKit={TYPE_KIT_C} highlightTreatment="mono" />
            <TabBar />
            <InstagramGrid typeKit={TYPE_KIT_C} />
          </div>
        );
      }

      function App() {
        return (
          <div className="page">
            <div className="meta">
              <div className="eyebrow">Direction C · Wide Display</div>
              <h1 className="title">
                The wide, <span className="accent">quiet</span> operator grid.
              </h1>
              <p className="lede">
                Roc Grotesk Wide at 700. Positive tracking, airy interiors. Grid
                reads gallery-quiet — the brand mark is the width of the
                letterforms, not the weight. Dain Walker DNA: premium without
                shouting.
              </p>
              <div className="spec">
                <div className="spec-row">
                  <div className="spec-key">Device</div>
                  <div className="spec-val">
                    iPhone 15 Pro · 393×852 (unrolled for review)
                  </div>
                </div>
                <div className="spec-row">
                  <div className="spec-key">Display</div>
                  <div className="spec-val">
                    Roc Grotesk Wide · 700 · ~0em tracking
                  </div>
                </div>
                <div className="spec-row">
                  <div className="spec-key">Body</div>
                  <div className="spec-val">SF Pro (IG system) · 13–17px</div>
                </div>
                <div className="spec-row">
                  <div className="spec-key">Accent rule</div>
                  <div className="spec-val">
                    One word in #7B2FBE per titled cell. No exceptions.
                  </div>
                </div>
                <div className="spec-row">
                  <div className="spec-key">Grid</div>
                  <div className="spec-val">3×3, 4:5 cells, 2px white gaps</div>
                </div>
                <div className="spec-row">
                  <div className="spec-key">Highlights</div>
                  <div className="spec-val">
                    Dark monochrome covers. Deepest shadows of the three
                    directions.
                  </div>
                </div>
              </div>
              <div className="swatches">
                <div className="swatch">
                  <div className="dot" style={{ background: "#7B2FBE" }} />
                  #7B2FBE
                </div>
                <div className="swatch">
                  <div className="dot" style={{ background: "#9B4FDE" }} />
                  #9B4FDE
                </div>
                <div className="swatch">
                  <div
                    className="dot"
                    style={{
                      background: "#1A1A1A",
                      border: "1px solid rgba(255,255,255,0.1)",
                    }}
                  />
                  #1A1A1A
                </div>
                <div className="swatch">
                  <div className="dot" style={{ background: "#F5F5F3" }} />
                  #F5F5F3
                </div>
              </div>
            </div>

            <div className="phone-col">
              <div className="phone-shell">
                <div className="dynamic-island" />
                <div className="phone-screen">
                  <InstagramProfile />
                </div>
              </div>
              <div className="caption">
                @sameer_rijhsinghani · final direction
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
