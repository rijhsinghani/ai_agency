<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instagram Profile — Sameer Rijhsinghani</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; overflow: hidden; }
  * { box-sizing: border-box; }
  body { font-family: 'Gilroy', -apple-system, system-ui, sans-serif; }
  /* Condensed/wide helpers for headlines on grid cells */
  .rg-cond { font-family: 'Roc Grotesk Cond', 'Roc Grotesk', 'Archivo Black', 'Inter', sans-serif; }
  .rg-wide { font-family: 'Roc Grotesk Wide', 'Roc Grotesk', sans-serif; }
  .rg { font-family: 'Roc Grotesk', 'Inter', sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="profile-cell.jsx"></script>
<script type="text/babel" src="profile-header.jsx"></script>
<script type="text/babel">

// ─────────────────────────────────────────────────────────────
// The 9 grid cells, fixed across all directions
// (copy/accent word are locked; only visual treatment varies)
// ─────────────────────────────────────────────────────────────
const GRID_CELLS = [
  // Row 1
  { kind: 'dark-card', headline: 'THE AI OPERATOR STACK', accent: 'STACK' },
  { kind: 'reel',      headline: 'WHY FOUNDERS BURN OUT',  accent: 'BURN', plays: '24.1K', variant: 'burnout' },
  { kind: 'dark-card', headline: 'ONE PERSON. FULL AGENCY.', accent: 'ONE' },
  // Row 2
  { kind: 'reel',      headline: 'THE FOLLOW-UP PROBLEM',  accent: 'PROBLEM', plays: '18.7K' },
  { kind: 'lifestyle', headline: '',                        accent: '' },
  { kind: 'reel',      headline: 'NOT AN AGENCY',          accent: 'NOT', plays: '31.2K' },
  // Row 3
  { kind: 'light-card', headline: 'WHY I ONLY TAKE 4 CLIENTS', accent: '4' },
  { kind: 'reel',       headline: 'STOP DOING THIS MANUALLY',  accent: 'STOP', plays: '9.6K' },
  { kind: 'diagram',    headline: '', accent: '' },
];

// ─────────────────────────────────────────────────────────────
// Type kits per direction
// ─────────────────────────────────────────────────────────────
const TYPE_KITS = {
  A: { // Heavy condensed — Butcher DNA
    fontFamily: "'Roc Grotesk Cond', 'Roc Grotesk', 'Archivo Black', 'Inter', sans-serif",
    fontWeight: 900,
    letterSpacing: '-0.01em',
    lineHeight: 0.95,
    textTransform: 'uppercase',
    sizeScale: 1.0,
  },
  B: { // Regular weight, wide, spacious — Koe editorial DNA
    fontFamily: "'Roc Grotesk', 'Inter', sans-serif",
    fontWeight: 700,
    letterSpacing: '-0.02em',
    lineHeight: 1.05,
    textTransform: 'uppercase',
    sizeScale: 0.88,
  },
  C: { // Wide display — Dain Walker DNA, airy, serif-like weight
    fontFamily: "'Roc Grotesk Wide', 'Roc Grotesk', sans-serif",
    fontWeight: 700,
    letterSpacing: '0em',
    lineHeight: 1.0,
    textTransform: 'uppercase',
    sizeScale: 0.82,
  },
};

// ─────────────────────────────────────────────────────────────
// Grid component — 3x3, 4:5 cells, 2px white gaps
// ─────────────────────────────────────────────────────────────
function InstagramGrid({ typeKit }) {
  // iPhone width 393 minus 0 (full-bleed grid). 3 cells across, 2px gap.
  const cellW = (393 - 4) / 3; // ~129.67
  const cellH = cellW * 5 / 4;
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: 'repeat(3, 1fr)',
      gap: 2,
      background: '#0a0a0a',
    }}>
      {GRID_CELLS.map((cfg, i) => (
        <div key={i} style={{ aspectRatio: '4/5', width: '100%', minWidth: 0, overflow: 'hidden', background: '#0a0a0a' }}>
          <GridCell config={cfg} typeKit={typeKit} />
        </div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Full profile — wrapped in iPhone frame
// ─────────────────────────────────────────────────────────────
function InstagramProfile({ typeKit, highlightTreatment }) {
  return (
    <div style={{
      width: 393, minHeight: 1560,
      background: '#0E0E0E',
      position: 'relative',
      fontFamily: '-apple-system, system-ui, sans-serif',
    }}>
      {/* iOS status bar (simplified, dark) */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '14px 28px 4px', color: '#F5F5F3', fontSize: 15, fontWeight: 600,
      }}>
        <span>9:41</span>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <svg width="17" height="11" viewBox="0 0 17 11" fill="#F5F5F3"><rect x="0" y="6" width="3" height="5" rx="0.5"/><rect x="4.5" y="4" width="3" height="7" rx="0.5"/><rect x="9" y="2" width="3" height="9" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5"/></svg>
          <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="#F5F5F3" strokeOpacity="0.5"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="#F5F5F3"/><rect x="22.5" y="4" width="1.5" height="4" rx="0.3" fill="#F5F5F3" opacity="0.5"/></svg>
        </div>
      </div>

      <ProfileHeader typeKit={typeKit} highlightTreatment={highlightTreatment} />
      <TabBar />
      <InstagramGrid typeKit={typeKit} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// iPhone device shell
// ─────────────────────────────────────────────────────────────
// Tall phone frame — shows entire scrolled profile in one continuous view.
// Real iPhone viewport is 393×852; we extend the chassis vertically so all 9
// grid cells + header + highlights are visible without scrolling.
const PHONE_CONTENT_H = 1560; // fits status+header+highlights+tab+3 rows of grid
function PhoneFrame({ children }) {
  return (
    <div style={{
      width: 423, height: PHONE_CONTENT_H + 30, borderRadius: 54,
      background: '#0a0a0a', padding: 14,
      boxShadow: '0 30px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.3)',
      position: 'relative',
    }}>
      <div style={{
        width: '100%', height: '100%', borderRadius: 40, overflow: 'hidden',
        background: '#0E0E0E', position: 'relative',
      }}>
        {/* dynamic island */}
        <div style={{
          position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)',
          width: 120, height: 35, borderRadius: 22, background: '#000', zIndex: 50,
        }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Per-direction overrides (Highlights treatment)
// ─────────────────────────────────────────────────────────────
function DirectionA() { // Heavy condensed, edge-to-edge grid, plain highlights
  return <PhoneFrame><InstagramProfile typeKit={TYPE_KITS.A} highlightTreatment="plain" /></PhoneFrame>;
}
function DirectionB() { // Medium weight, editorial spacing, ring highlights
  return <PhoneFrame><InstagramProfile typeKit={TYPE_KITS.B} highlightTreatment="ring" /></PhoneFrame>;
}
function DirectionC() { // Wide, spacious, monochrome highlight covers
  return <PhoneFrame><InstagramProfile typeKit={TYPE_KITS.C} highlightTreatment="mono" /></PhoneFrame>;
}

// ─────────────────────────────────────────────────────────────
// Root
// ─────────────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas>
      {/* Title block */}
      <div style={{ padding: '0 60px 40px', maxWidth: 1200 }}>
        <div style={{
          fontSize: 11, fontWeight: 600, color: '#7B2FBE',
          letterSpacing: '0.2em', textTransform: 'uppercase', marginBottom: 8,
        }}>— Instagram Profile · @sameer_rijhsinghani</div>
        <div style={{
          fontSize: 36, fontWeight: 800, color: '#1a1a1a',
          letterSpacing: '-0.02em', lineHeight: 1.05, marginBottom: 12,
          fontFamily: "'Roc Grotesk', 'Inter', sans-serif",
        }}>Three directions. One bio, one brand token set, three typographic systems.</div>
        <div style={{
          fontSize: 15, color: 'rgba(60,50,40,0.7)', lineHeight: 1.55, maxWidth: 720,
        }}>Bio, handle, stats, link, and brand colors are locked across all three. What
          varies: (1) headline font + weight on grid cards, (2) grid cadence &amp; rhythm,
          and (3) highlight cover treatment. The strict one-word-purple accent rule holds
          on every titled cell.</div>
      </div>

      <DCSection
        title="Direction A — Heavy Condensed"
        subtitle="Butcher DNA. Condensed 900-weight, packed text, tight leading. Highlights: close-crop silhouette. Grid: edge-to-edge, no breathing room."
      >
        <DCArtboard label="iPhone 15 Pro · 393×852 (unrolled view)" width={423} height={1600} style={{ background: 'transparent', borderRadius: 54, boxShadow: 'none', overflow: 'visible' }}>
          <DirectionA />
        </DCArtboard>
        <DCPostIt top={60} left={-20} rotate={3} width={200}>
          Condensed 900. Max ink density. Single purple word carries the whole cell.
        </DCPostIt>
      </DCSection>

      <DCSection
        title="Direction B — Editorial Display"
        subtitle="Koe DNA. Mid-weight Roc Grotesk, snug tracking, more negative space inside each tile. Highlights: wider/looser portrait crop with ring border."
      >
        <DCArtboard label="iPhone 15 Pro · 393×852 (unrolled view)" width={423} height={1600} style={{ background: 'transparent', borderRadius: 54, boxShadow: 'none', overflow: 'visible' }}>
          <DirectionB />
        </DCArtboard>
        <DCPostIt top={200} right={-20} rotate={-2} width={200}>
          Same copy, more air. Feels like a publication, not a wall of text.
        </DCPostIt>
      </DCSection>

      <DCSection
        title="Direction C — Wide Display"
        subtitle="Dain Walker DNA. Roc Grotesk Wide, 700, positive tracking on display sizes. Highlights: near-monochrome, deepest shadows. Grid reads gallery-quiet."
      >
        <DCArtboard label="iPhone 15 Pro · 393×852 (unrolled view)" width={423} height={1600} style={{ background: 'transparent', borderRadius: 54, boxShadow: 'none', overflow: 'visible' }}>
          <DirectionC />
        </DCArtboard>
        <DCPostIt bottom={100} left={-10} rotate={-3} width={200}>
          Wide letterforms = premium operator. Shorter headlines read better here.
        </DCPostIt>
      </DCSection>

      {/* Token swatch */}
      <div style={{ padding: '0 60px 40px' }}>
        <div style={{
          fontSize: 11, fontWeight: 600, color: 'rgba(60,50,40,0.7)',
          letterSpacing: '0.2em', textTransform: 'uppercase', marginBottom: 12,
        }}>Locked tokens across all directions</div>
        <div style={{ display: 'flex', gap: 12 }}>
          {[
            ['#7B2FBE', 'Primary purple'],
            ['#9B4FDE', 'Light purple'],
            ['#1A1A1A', 'Dark base'],
            ['#F5F5F3', 'Light break'],
            ['#FFFFFF', 'Pure white text'],
          ].map(([c, l]) => (
            <div key={c} style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'white', padding: '10px 14px', borderRadius: 8, boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}>
              <div style={{ width: 28, height: 28, borderRadius: 6, background: c, border: c === '#FFFFFF' ? '1px solid rgba(0,0,0,0.1)' : 'none' }} />
              <div>
                <div style={{ fontSize: 12, fontWeight: 600, color: '#1a1a1a', fontFamily: 'JetBrains Mono, monospace' }}>{c}</div>
                <div style={{ fontSize: 11, color: 'rgba(60,50,40,0.6)' }}>{l}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
