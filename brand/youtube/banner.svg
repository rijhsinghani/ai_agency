<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="2560" height="1440" role="img" aria-label="Sameer Automations YouTube Banner">
  <title>Sameer Automations — YouTube Channel Banner</title>

  <!-- Background -->
  <rect width="2560" height="1440" fill="#1A1A1A"/>

  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#2A2A2A" stroke-width="1"/>
    </pattern>
    <!-- Large purple glow — fills TV/desktop zones -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#7B2FBE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <!-- Top-left corner glow -->
    <radialGradient id="cornerGlowTL" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom-right corner glow -->
    <radialGradient id="cornerGlowBR" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#9B4FDE" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#9B4FDE" stop-opacity="0"/>
    </radialGradient>
    <!-- Purple glow behind logo -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Grid overlay — slightly more visible -->
  <rect width="2560" height="1440" fill="url(#grid)"/>

  <!-- Full-canvas purple glow — makes outer zones visibly branded -->
  <rect width="2560" height="1440" fill="url(#bgGlow)"/>
  <rect width="2560" height="1440" fill="url(#cornerGlowTL)"/>
  <rect width="2560" height="1440" fill="url(#cornerGlowBR)"/>

  <!-- Horizontal accent lines spanning full width (visible in TV/desktop crops) -->
  <rect x="0" y="340" width="2560" height="1" fill="#7B2FBE" opacity="0.15"/>
  <rect x="0" y="1100" width="2560" height="1" fill="#7B2FBE" opacity="0.15"/>

  <!-- Decorative S-curves in outer zones (faint, branded) -->
  <g opacity="0.06">
    <path d="M 200 300 C 200 200 280 200 280 300 C 280 400 200 400 200 500" stroke="#7B2FBE" stroke-width="40" stroke-linecap="round" fill="none"/>
    <path d="M 2360 940 C 2360 1040 2280 1040 2280 1140 C 2280 1240 2360 1240 2360 1340" stroke="#9B4FDE" stroke-width="40" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Corner bracket decorations (visible on TV crop) -->
  <g stroke="#7B2FBE" stroke-width="3" fill="none" opacity="0.25">
    <!-- Top-left -->
    <path d="M 60 60 L 60 120 M 60 60 L 120 60"/>
    <!-- Top-right -->
    <path d="M 2500 60 L 2500 120 M 2500 60 L 2440 60"/>
    <!-- Bottom-left -->
    <path d="M 60 1380 L 60 1320 M 60 1380 L 120 1380"/>
    <!-- Bottom-right -->
    <path d="M 2500 1380 L 2500 1320 M 2500 1380 L 2440 1380"/>
  </g>

  <!-- Left edge accent -->
  <rect x="0" y="0" width="4" height="1440" fill="#7B2FBE" opacity="0.6"/>
  <!-- Right edge accent -->
  <rect x="2556" y="0" width="4" height="1440" fill="#7B2FBE" opacity="0.3"/>

  <!-- Purple accent line at bottom of safe zone -->
  <rect x="507" y="880" width="1546" height="4" fill="#7B2FBE" rx="2"/>

  <!-- Purple glow behind logo -->
  <ellipse cx="760" cy="720" rx="260" ry="260" fill="url(#logoGlow)"/>

  <!-- ============================================================ -->
  <!-- SAFE ZONE: 1546x423, centered at (1280, 720)                 -->
  <!-- Left: 507  Right: 2053  Top: 509  Bottom: 931               -->
  <!-- All content below must fit within 507-2053 horizontally      -->
  <!-- ============================================================ -->

  <!-- Logo Icon — scaled down to fit safe zone -->
  <g transform="translate(640, 640) scale(1.3)">
    <path
      d="M 75 10 L 25 10 C 12 10 5 20 5 32 C 5 44 12 54 25 54 L 75 54 C 88 54 95 64 95 76 C 95 88 88 98 75 98 L 25 98"
      stroke="#7B2FBE"
      stroke-width="8"
      stroke-linecap="round"
      fill="none"
    />
    <circle cx="75" cy="10" r="5" fill="#7B2FBE"/>
    <circle cx="25" cy="98" r="5" fill="#9B4FDE"/>
  </g>

  <!-- Vertical divider -->
  <rect x="790" y="640" width="2" height="160" fill="#7B2FBE" opacity="0.5" rx="1"/>

  <!-- Wordmark — reduced size to fit safe zone -->
  <text
    x="1400"
    y="710"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="78"
    font-weight="700"
    letter-spacing="8"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="auto"
  >SAMEER AUTOMATIONS</text>

  <!-- Tagline -->
  <text
    x="1400"
    y="780"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="30"
    font-weight="400"
    letter-spacing="2"
    fill="#888888"
    text-anchor="middle"
    dominant-baseline="auto"
  >Smart systems. Built for your business. By Sameer.</text>

  <!-- Purple dot accents -->
  <circle cx="880" cy="774" r="4" fill="#9B4FDE" opacity="0.7"/>
  <circle cx="1920" cy="774" r="4" fill="#9B4FDE" opacity="0.7"/>

</svg>
