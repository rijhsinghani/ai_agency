<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="2560" height="1440" role="img" aria-label="Sameer Rijhsinghani YouTube Banner">
  <title>Sameer Rijhsinghani — YouTube Channel Banner</title>

  <defs>
    <!-- Gradient background — dark to slightly lighter -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="50%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <!-- Central purple glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#7B2FBE" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <!-- Accent glow bottom-right -->
    <radialGradient id="accentGlow" cx="75%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#9B4FDE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9B4FDE" stop-opacity="0"/>
    </radialGradient>
    <!-- Name text gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1440" fill="url(#bgGrad)"/>

  <!-- Subtle noise texture via fine grid -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#FFFFFF" opacity="0.03"/>
  </pattern>
  <rect width="2560" height="1440" fill="url(#dots)"/>

  <!-- Atmospheric glows -->
  <rect width="2560" height="1440" fill="url(#centerGlow)"/>
  <rect width="2560" height="1440" fill="url(#accentGlow)"/>

  <!-- Thin horizontal accent line — above content -->
  <rect x="830" y="620" width="900" height="1" fill="#7B2FBE" opacity="0.4"/>

  <!-- ============================================================ -->
  <!-- SAFE ZONE: 1546x423, centered at (1280, 720)                 -->
  <!-- Left: 507  Right: 2053  Top: 509  Bottom: 931               -->
  <!-- ============================================================ -->

  <!-- Full name — large, clean, centered -->
  <text
    x="1280"
    y="710"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="82"
    font-weight="700"
    letter-spacing="6"
    fill="url(#nameGrad)"
    text-anchor="middle"
    dominant-baseline="auto"
  >SAMEER RIJHSINGHANI</text>

  <!-- Purple accent bar under name -->
  <rect x="1205" y="730" width="150" height="4" fill="#7B2FBE" rx="2"/>

  <!-- Tagline -->
  <text
    x="1280"
    y="790"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="2"
    fill="#888888"
    text-anchor="middle"
    dominant-baseline="auto"
  >SMART SYSTEMS. BUILT FOR YOUR BUSINESS. BY SAMEER.</text>

  <!-- Thin horizontal accent line — below content -->
  <rect x="830" y="820" width="900" height="1" fill="#7B2FBE" opacity="0.25"/>

  <!-- Subtle corner accents (visible on TV/desktop crops) -->
  <g stroke="#7B2FBE" stroke-width="2" fill="none" opacity="0.15">
    <path d="M 80 80 L 80 140 M 80 80 L 140 80"/>
    <path d="M 2480 80 L 2480 140 M 2480 80 L 2420 80"/>
    <path d="M 80 1360 L 80 1300 M 80 1360 L 140 1360"/>
    <path d="M 2480 1360 L 2480 1300 M 2480 1360 L 2420 1360"/>
  </g>

</svg>
