<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="2560" height="1440" role="img" aria-label="Sameer Rijhsinghani YouTube Banner">
  <title>Sameer Rijhsinghani — YouTube Channel Banner</title>

  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <radialGradient id="heroGlow" cx="68%" cy="35%" r="38%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.09"/>
      <stop offset="70%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="secondGlow" cx="25%" cy="75%" r="30%">
      <stop offset="0%" stop-color="#9B4FDE" stop-opacity="0.04"/>
      <stop offset="60%" stop-color="#9B4FDE" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EDE9E3"/>
      <stop offset="100%" stop-color="#D8D4CE"/>
    </linearGradient>

    <!-- Grid pattern for system architecture feel -->
    <pattern id="gridDots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="0.6" fill="#A8A29E" opacity="0.05"/>
    </pattern>

    <!-- Connection path gradient -->
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4DD9E8" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#7B2FBE" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF8A4C" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1440" fill="#0E0E0E"/>
  <rect width="2560" height="1440" filter="url(#grain)" opacity="0.035"/>
  <rect width="2560" height="1440" fill="url(#gridDots)"/>

  <!-- Ambient glows -->
  <rect width="2560" height="1440" fill="url(#heroGlow)"/>
  <rect width="2560" height="1440" fill="url(#secondGlow)"/>

  <!-- Flow gradient for S-wave icon -->
  <linearGradient id="bn-flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7B2FBE"/>
    <stop offset="50%" stop-color="#9B4FDE"/>
    <stop offset="100%" stop-color="#4DD9E8"/>
  </linearGradient>
  <!-- Input node halo (purple) -->
  <radialGradient id="bn-inputHalo" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
  </radialGradient>
  <!-- Output node halo (cyan) -->
  <radialGradient id="bn-outputHalo" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#4DD9E8" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#4DD9E8" stop-opacity="0"/>
  </radialGradient>
  <!-- Core node glow filter -->
  <filter id="bn-nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- S-wave icon watermark — subtle -->
  <g transform="translate(1750, 350) scale(5)" opacity="0.025">
    <!-- S-wave path with flow gradient -->
    <path d="M 80 20 C 40 20, 20 20, 20 40 C 20 60, 80 40, 80 60 C 80 80, 60 80, 20 80" stroke="url(#bn-flowGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Input node halo -->
    <circle cx="80" cy="20" r="10" fill="url(#bn-inputHalo)"/>
    <!-- Output node halo -->
    <circle cx="20" cy="80" r="10" fill="url(#bn-outputHalo)"/>
    <!-- Input node core -->
    <circle cx="80" cy="20" r="4" fill="#7B2FBE" filter="url(#bn-nodeGlow)"/>
    <circle cx="80" cy="20" r="1.5" fill="#FFFFFF"/>
    <!-- Output node core -->
    <circle cx="20" cy="80" r="4" fill="#4DD9E8" filter="url(#bn-nodeGlow)"/>
    <circle cx="20" cy="80" r="1.5" fill="#FFFFFF"/>
  </g>

  <!-- Connection nodes and paths — system architecture visual -->
  <!-- Node cluster: suggests data flow / system connections -->
  <g opacity="0.6">
    <!-- Nodes -->
    <circle cx="1500" cy="640" r="3" fill="#4DD9E8"/>
    <circle cx="1680" cy="695" r="3" fill="#7B2FBE"/>
    <circle cx="1580" cy="760" r="3" fill="#FF8A4C"/>
    <circle cx="1750" cy="780" r="2.5" fill="#D4A574"/>
    <circle cx="1850" cy="720" r="3" fill="#9B4FDE"/>
    <circle cx="1650" cy="830" r="2.5" fill="#4DD9E8"/>

    <!-- Connection paths -->
    <path d="M 1500 640 Q 1590 650 1680 695" stroke="#4DD9E8" stroke-width="0.8" fill="none" opacity="0.25" stroke-dasharray="4 6"/>
    <path d="M 1680 695 Q 1630 730 1580 760" stroke="#7B2FBE" stroke-width="0.8" fill="none" opacity="0.2" stroke-dasharray="4 6"/>
    <path d="M 1680 695 L 1850 720" stroke="#9B4FDE" stroke-width="0.8" fill="none" opacity="0.2" stroke-dasharray="4 6"/>
    <path d="M 1580 760 Q 1615 800 1650 830" stroke="#FF8A4C" stroke-width="0.8" fill="none" opacity="0.2" stroke-dasharray="4 6"/>
    <path d="M 1580 760 L 1750 780" stroke="#D4A574" stroke-width="0.8" fill="none" opacity="0.15" stroke-dasharray="4 6"/>
  </g>

  <!-- Accent line -->
  <rect x="540" y="665" width="48" height="2" fill="#7B2FBE"/>

  <!-- Name -->
  <text x="540" y="720" font-family="'Roc Grotesk', 'Outfit', sans-serif" font-size="74" font-weight="700" letter-spacing="1" fill="url(#nameGrad)" text-anchor="start">Sameer Rijhsinghani</text>

  <!-- Tagline -->
  <text x="540" y="775" font-family="'Gilroy', 'DM Sans', sans-serif" font-size="25" font-weight="400" letter-spacing="0.5" fill="#A8A29E" text-anchor="start">Smart systems. Built for your business.</text>

  <!-- Stats -->
  <g font-family="'Roc Grotesk', 'Outfit', sans-serif" text-anchor="start">
    <circle cx="540" cy="815" r="3.5" fill="#4DD9E8" opacity="0.7"/>
    <text x="555" y="819" font-size="16" font-weight="600" fill="#4DD9E8" letter-spacing="0.5">60s</text>
    <text x="598" y="819" font-size="13" font-weight="400" fill="#A8A29E">response time</text>

    <rect x="760" y="806" width="1" height="16" fill="#EDE9E3" opacity="0.08"/>

    <circle cx="778" cy="815" r="3.5" fill="#FF8A4C" opacity="0.7"/>
    <text x="793" y="819" font-size="16" font-weight="600" fill="#FF8A4C" letter-spacing="0.5">2x</text>
    <text x="822" y="819" font-size="13" font-weight="400" fill="#A8A29E">more jobs booked</text>
  </g>

</svg>
