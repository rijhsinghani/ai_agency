<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Sameer Automations Thumbnail Template">
  <title>Sameer Automations — Video Thumbnail Template</title>

  <defs>
    <!-- Main background gradient: darkest left, lighter toward headshot area -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="55%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#202020"/>
    </linearGradient>

    <!-- Purple glow behind text area -->
    <radialGradient id="textGlow" cx="30%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>

    <!-- Headshot placeholder gradient -->
    <linearGradient id="headshotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>

    <!-- Headshot fade: left edge fades into dark bg -->
    <linearGradient id="headshotFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1A1A" stop-opacity="1"/>
      <stop offset="30%" stop-color="#1A1A1A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1A1A1A" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle grid pattern for texture -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222222" stroke-width="0.5"/>
    </pattern>

    <!-- Clip for headshot placeholder rounded rect -->
    <clipPath id="headshotClip">
      <rect x="760" y="20" width="500" height="640" rx="8"/>
    </clipPath>
  </defs>

  <!-- ===================== BACKGROUND ===================== -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect width="1280" height="720" fill="url(#textGlow)"/>

  <!-- ===================== HEADSHOT AREA (right side) ===================== -->
  <!-- Placeholder box for creator headshot photo -->
  <rect x="760" y="20" width="500" height="640" fill="url(#headshotGrad)" rx="8" opacity="0.8"/>

  <!-- Headshot placeholder indicator -->
  <!-- Person silhouette icon, centered in headshot zone: cx=1010, cy=310 -->
  <circle cx="1010" cy="240" r="70" fill="#2E2E2E"/>
  <path d="M 880 500 Q 880 380 1010 380 Q 1140 380 1140 500 L 1140 640 L 880 640 Z" fill="#2E2E2E"/>

  <!-- Dashed border to show it's a placeholder -->
  <rect x="760" y="20" width="500" height="640" fill="none" stroke="#444444" stroke-width="2" stroke-dasharray="12,6" rx="8"/>

  <!-- Placeholder label -->
  <text
    x="1010"
    y="560"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="20"
    fill="#555555"
    text-anchor="middle"
    letter-spacing="2"
  >HEADSHOT PHOTO</text>

  <!-- Fade overlay: blends headshot into text area -->
  <rect x="760" y="20" width="200" height="640" fill="url(#headshotFade)" rx="8"/>

  <!-- ===================== LEFT TEXT AREA ===================== -->
  <!-- Purple accent bar: left edge -->
  <rect x="0" y="0" width="8" height="720" fill="#7B2FBE"/>

  <!-- Logo icon: top-left corner, small -->
  <!-- Original viewBox 100x108, rendered at ~54x58px -->
  <g transform="translate(28, 28) scale(0.54)">
    <path
      d="M 75 10 L 25 10 C 12 10 5 20 5 32 C 5 44 12 54 25 54 L 75 54 C 88 54 95 64 95 76 C 95 88 88 98 75 98 L 25 98"
      stroke="#7B2FBE"
      stroke-width="8"
      stroke-linecap="round"
      fill="none"
    />
    <circle cx="75" cy="10" r="5" fill="#7B2FBE"/>
    <circle cx="25" cy="98" r="5" fill="#9B4FDE"/>
  </g>

  <!-- Channel name: top-left, next to logo -->
  <text
    x="90"
    y="62"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="20"
    font-weight="700"
    letter-spacing="3"
    fill="#7B2FBE"
  >SAMEER AUTOMATIONS</text>

  <!-- ===================== VIDEO TITLE BLOCK ===================== -->
  <!-- Title label / instruction -->
  <text
    x="28"
    y="200"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="16"
    fill="#555555"
    letter-spacing="2"
  >VIDEO TITLE — LINE 1</text>

  <!-- Title line 1 placeholder -->
  <text
    x="28"
    y="320"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="86"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="-2"
  >YOUR TITLE</text>

  <!-- Title line 2 placeholder (shorter, bold, highlighted) -->
  <text
    x="28"
    y="430"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="86"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="-2"
    opacity="0.85"
  >GOES HERE</text>

  <!-- Purple highlight bar: sits behind a key word -->
  <!-- Use this as a colored accent under/behind a single emphasized word -->
  <rect x="28" y="442" width="340" height="10" fill="#7B2FBE" rx="3"/>

  <!-- Subtitle / stat line -->
  <text
    x="28"
    y="540"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="30"
    font-weight="400"
    fill="#9B4FDE"
    letter-spacing="1"
  >Save 10+ hours a week — real results</text>

  <!-- ===================== BOTTOM ACCENT BAR ===================== -->
  <rect x="0" y="684" width="1280" height="8" fill="#7B2FBE"/>

  <!-- Bottom-left: episode type tag -->
  <rect x="28" y="640" width="180" height="36" fill="#7B2FBE" rx="4"/>
  <text
    x="118"
    y="664"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="16"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="2"
  >CASE STUDY</text>

  <!-- Bottom-right: URL watermark -->
  <text
    x="1252"
    y="664"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="16"
    fill="#555555"
    text-anchor="end"
    letter-spacing="1"
  >rajphotovideo.com</text>

</svg>
