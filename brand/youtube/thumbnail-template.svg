<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Sameer Automations Thumbnail Template">
  <title>Sameer Automations — Video Thumbnail Template</title>

  <defs>
    <!-- Grain filter (system architecture texture) -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- Grid dot pattern (replaces linear grid) -->
    <pattern id="gridDots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="0.6" fill="#A8A29E" opacity="0.05"/>
    </pattern>

    <!-- Purple glow behind text area -->
    <radialGradient id="textGlow" cx="30%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>

    <!-- Headshot placeholder gradient -->
    <linearGradient id="headshotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>

    <!-- Headshot fade: left edge fades into dark bg -->
    <linearGradient id="headshotFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E0E0E" stop-opacity="1"/>
      <stop offset="30%" stop-color="#0E0E0E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0E0E0E" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip for headshot placeholder rounded rect -->
    <clipPath id="headshotClip">
      <rect x="760" y="20" width="500" height="640" rx="8"/>
    </clipPath>
  </defs>

  <!-- ===================== BACKGROUND ===================== -->
  <rect width="1280" height="720" fill="#0E0E0E"/>
  <rect width="1280" height="720" filter="url(#grain)" opacity="0.04"/>
  <rect width="1280" height="720" fill="url(#gridDots)"/>
  <rect width="1280" height="720" fill="url(#textGlow)"/>

  <!-- ===================== CONNECTION NODES + PATHS (background) ===================== -->
  <g opacity="0.5">
    <circle cx="100" cy="120" r="2.5" fill="#4DD9E8" opacity="0.5"/>
    <circle cx="280" cy="160" r="2.5" fill="#7B2FBE" opacity="0.5"/>
    <circle cx="180" cy="650" r="2.5" fill="#FF8A4C" opacity="0.5"/>
    <circle cx="700" cy="100" r="2" fill="#D4A574" opacity="0.4"/>
    <circle cx="680" cy="620" r="2.5" fill="#9B4FDE" opacity="0.5"/>

    <path d="M 100 120 Q 190 130 280 160" stroke="#4DD9E8" stroke-width="0.8" fill="none" opacity="0.2" stroke-dasharray="4 6"/>
    <path d="M 280 160 Q 240 400 180 650" stroke="#7B2FBE" stroke-width="0.8" fill="none" opacity="0.15" stroke-dasharray="4 6"/>
    <path d="M 700 100 Q 695 360 680 620" stroke="#9B4FDE" stroke-width="0.8" fill="none" opacity="0.15" stroke-dasharray="4 6"/>
  </g>

  <!-- ===================== HEADSHOT AREA (right side) ===================== -->
  <!-- Placeholder box for creator headshot photo -->
  <rect x="760" y="20" width="500" height="640" fill="url(#headshotGrad)" rx="8" opacity="0.8"/>

  <!-- Headshot placeholder indicator -->
  <circle cx="1010" cy="240" r="70" fill="#2E2E2E"/>
  <path d="M 880 500 Q 880 380 1010 380 Q 1140 380 1140 500 L 1140 640 L 880 640 Z" fill="#2E2E2E"/>

  <!-- Dashed border to show it's a placeholder -->
  <rect x="760" y="20" width="500" height="640" fill="none" stroke="#444444" stroke-width="2" stroke-dasharray="12,6" rx="8"/>

  <!-- Placeholder label -->
  <text
    x="1010"
    y="560"
    font-family="'Gilroy', 'DM Sans', sans-serif"
    font-size="20"
    fill="#555555"
    text-anchor="middle"
    letter-spacing="2"
  >HEADSHOT PHOTO</text>

  <!-- Fade overlay: blends headshot into text area -->
  <rect x="760" y="20" width="200" height="640" fill="url(#headshotFade)" rx="8"/>

  <!-- ===================== LEFT TEXT AREA ===================== -->
  <!-- Purple accent bar: left edge -->
  <rect x="0" y="0" width="8" height="720" fill="#7B2FBE"/>

  <!-- Flow gradient and node styles for S-wave icon -->
  <defs>
    <linearGradient id="th-flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="50%" stop-color="#9B4FDE"/>
      <stop offset="100%" stop-color="#4DD9E8"/>
    </linearGradient>
    <radialGradient id="th-inputHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="th-outputHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DD9E8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4DD9E8" stop-opacity="0"/>
    </radialGradient>
    <filter id="th-nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Logo icon: top-left corner, small -->
  <g transform="translate(28, 28) scale(0.54)">
    <!-- S-wave path with flow gradient -->
    <path
      d="M 80 20 C 40 20, 20 20, 20 40 C 20 60, 80 40, 80 60 C 80 80, 60 80, 20 80"
      stroke="url(#th-flowGrad)"
      stroke-width="8"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Input node halo -->
    <circle cx="80" cy="20" r="12" fill="url(#th-inputHalo)"/>
    <!-- Output node halo -->
    <circle cx="20" cy="80" r="12" fill="url(#th-outputHalo)"/>
    <!-- Input node core -->
    <circle cx="80" cy="20" r="5" fill="#7B2FBE" filter="url(#th-nodeGlow)"/>
    <circle cx="80" cy="20" r="2" fill="#FFFFFF"/>
    <!-- Output node core -->
    <circle cx="20" cy="80" r="5" fill="#4DD9E8" filter="url(#th-nodeGlow)"/>
    <circle cx="20" cy="80" r="2" fill="#FFFFFF"/>
  </g>

  <!-- Channel name -->
  <text
    x="90"
    y="62"
    font-family="'Roc Grotesk', 'Outfit', sans-serif"
    font-size="20"
    font-weight="700"
    letter-spacing="3"
    fill="#7B2FBE"
  >SAMEER AUTOMATIONS</text>

  <!-- ===================== VIDEO TITLE BLOCK ===================== -->
  <!-- Title label / instruction -->
  <text
    x="28"
    y="200"
    font-family="'Gilroy', 'DM Sans', sans-serif"
    font-size="16"
    fill="#555555"
    letter-spacing="2"
  >VIDEO TITLE — LINE 1</text>

  <!-- Title line 1 placeholder -->
  <text
    x="28"
    y="320"
    font-family="'Roc Grotesk', 'Outfit', sans-serif"
    font-size="86"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="-2"
  >YOUR TITLE</text>

  <!-- Title line 2 placeholder -->
  <text
    x="28"
    y="430"
    font-family="'Roc Grotesk', 'Outfit', sans-serif"
    font-size="86"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="-2"
    opacity="0.85"
  >GOES HERE</text>

  <!-- Dashed accent line with connection node (replaces solid highlight bar) -->
  <line x1="28" y1="447" x2="358" y2="447" stroke="#7B2FBE" stroke-width="2" stroke-dasharray="4 6" opacity="0.6"/>
  <circle cx="362" cy="447" r="3.5" fill="#4DD9E8" opacity="0.7"/>

  <!-- Connection node accents near CASE STUDY tag -->
  <circle cx="20" cy="658" r="3" fill="#4DD9E8" opacity="0.6"/>

  <!-- Subtitle / stat line -->
  <text
    x="28"
    y="540"
    font-family="'Gilroy', 'DM Sans', sans-serif"
    font-size="30"
    font-weight="400"
    fill="#9B4FDE"
    letter-spacing="1"
  >Save 10+ hours a week — real results</text>

  <!-- ===================== BOTTOM ACCENT BAR ===================== -->
  <rect x="0" y="684" width="1280" height="8" fill="#7B2FBE"/>

  <!-- Bottom-left: episode type tag -->
  <rect x="28" y="640" width="180" height="36" fill="#7B2FBE" rx="4"/>
  <text
    x="118"
    y="664"
    font-family="'Roc Grotesk', 'Outfit', sans-serif"
    font-size="16"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="2"
  >CASE STUDY</text>

  <!-- Bottom-right: URL watermark -->
  <text
    x="1252"
    y="664"
    font-family="'Gilroy', 'DM Sans', sans-serif"
    font-size="16"
    fill="#555555"
    text-anchor="end"
    letter-spacing="1"
  >rajphotovideo.com</text>

</svg>
