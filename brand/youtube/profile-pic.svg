<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Sameer Rijhsinghani Profile Picture">
  <title>Sameer Rijhsinghani</title>

  <defs>
    <!-- Grain filter for system architecture texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- Grid dot pattern (matches banner) -->
    <pattern id="gridDots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="0.6" fill="#A8A29E" opacity="0.05"/>
    </pattern>

    <!-- Purple inner glow behind the S -->
    <radialGradient id="sGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="400" cy="400" r="400"/>
    </clipPath>
  </defs>

  <!-- Everything clipped to circle -->
  <g clip-path="url(#circleClip)">
    <!-- Solid dark background (system architecture base) -->
    <circle cx="400" cy="400" r="400" fill="#0E0E0E"/>

    <!-- Grain texture overlay (slightly higher opacity for small-size visibility) -->
    <rect width="800" height="800" filter="url(#grain)" opacity="0.06"/>

    <!-- Grid dots pattern -->
    <rect width="800" height="800" fill="url(#gridDots)"/>

    <!-- Purple glow layer -->
    <ellipse cx="400" cy="400" rx="260" ry="260" fill="url(#sGlow)"/>

    <!-- Connection paths (behind S logo, triangle formation) -->
    <g opacity="0.8">
      <path d="M 200 300 Q 300 260 400 220" stroke="#4DD9E8" stroke-width="1.2" fill="none" opacity="0.5" stroke-dasharray="4 6"/>
      <path d="M 400 220 Q 520 230 600 250" stroke="#FF8A4C" stroke-width="1.2" fill="none" opacity="0.45" stroke-dasharray="4 6"/>
      <path d="M 600 250 Q 590 430 550 600" stroke="#9B4FDE" stroke-width="1.2" fill="none" opacity="0.45" stroke-dasharray="4 6"/>
      <path d="M 550 600 Q 380 470 200 300" stroke="#7B2FBE" stroke-width="1.2" fill="none" opacity="0.4" stroke-dasharray="4 6"/>
    </g>

    <!-- Connection nodes (triangle formation around S logo) -->
    <circle cx="200" cy="300" r="5" fill="#4DD9E8" opacity="0.9"/>
    <circle cx="600" cy="250" r="5" fill="#FF8A4C" opacity="0.9"/>
    <circle cx="550" cy="600" r="5" fill="#9B4FDE" opacity="0.9"/>

    <!-- Flow gradient for S-wave icon -->
    <defs>
      <linearGradient id="pp-flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7B2FBE"/>
        <stop offset="50%" stop-color="#9B4FDE"/>
        <stop offset="100%" stop-color="#4DD9E8"/>
      </linearGradient>
      <radialGradient id="pp-inputHalo" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="pp-outputHalo" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#4DD9E8" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#4DD9E8" stop-opacity="0"/>
      </radialGradient>
      <filter id="pp-nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Logo S-wave icon, scaled and centered -->
    <g transform="translate(240, 220) scale(3.2)">
      <!-- S-wave path with flow gradient -->
      <path
        d="M 80 20 C 40 20, 20 20, 20 40 C 20 60, 80 40, 80 60 C 80 80, 60 80, 20 80"
        stroke="url(#pp-flowGrad)"
        stroke-width="8"
        stroke-linecap="round"
        fill="none"
      />
      <!-- Input node halo -->
      <circle cx="80" cy="20" r="12" fill="url(#pp-inputHalo)"/>
      <!-- Output node halo -->
      <circle cx="20" cy="80" r="12" fill="url(#pp-outputHalo)"/>
      <!-- Input node core -->
      <circle cx="80" cy="20" r="5" fill="#7B2FBE" filter="url(#pp-nodeGlow)"/>
      <circle cx="80" cy="20" r="2" fill="#FFFFFF"/>
      <!-- Output node core -->
      <circle cx="20" cy="80" r="5" fill="#4DD9E8" filter="url(#pp-nodeGlow)"/>
      <circle cx="20" cy="80" r="2" fill="#FFFFFF"/>
    </g>

    <!-- SR watermark in Outfit font -->
    <text
      x="400"
      y="750"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="28"
      font-weight="700"
      letter-spacing="6"
      fill="#888888"
      text-anchor="middle"
      opacity="0.4"
    >SR</text>
  </g>

  <!-- Purple border ring (outside clip, rendered on top) -->
  <circle cx="400" cy="400" r="390" fill="none" stroke="#7B2FBE" stroke-width="6" opacity="1.0"/>

</svg>
