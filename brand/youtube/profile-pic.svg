<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Sameer Rijhsinghani Profile Picture">
  <title>Sameer Rijhsinghani</title>

  <defs>
    <!-- Grain filter for system architecture texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- Grid dot pattern (matches banner) -->
    <pattern id="gridDots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="0.6" fill="#A8A29E" opacity="0.05"/>
    </pattern>

    <!-- Purple inner glow behind the S -->
    <radialGradient id="sGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="400" cy="400" r="400"/>
    </clipPath>
  </defs>

  <!-- Everything clipped to circle -->
  <g clip-path="url(#circleClip)">
    <!-- Solid dark background (system architecture base) -->
    <circle cx="400" cy="400" r="400" fill="#0E0E0E"/>

    <!-- Grain texture overlay (slightly higher opacity for small-size visibility) -->
    <rect width="800" height="800" filter="url(#grain)" opacity="0.06"/>

    <!-- Grid dots pattern -->
    <rect width="800" height="800" fill="url(#gridDots)"/>

    <!-- Purple glow layer -->
    <ellipse cx="400" cy="400" rx="260" ry="260" fill="url(#sGlow)"/>

    <!-- Connection paths (behind S logo, triangle formation) -->
    <g opacity="0.5">
      <path d="M 200 300 Q 300 260 400 220" stroke="#4DD9E8" stroke-width="0.8" fill="none" opacity="0.3" stroke-dasharray="4 6"/>
      <path d="M 400 220 Q 520 230 600 250" stroke="#FF8A4C" stroke-width="0.8" fill="none" opacity="0.25" stroke-dasharray="4 6"/>
      <path d="M 600 250 Q 590 430 550 600" stroke="#9B4FDE" stroke-width="0.8" fill="none" opacity="0.25" stroke-dasharray="4 6"/>
      <path d="M 550 600 Q 380 470 200 300" stroke="#7B2FBE" stroke-width="0.8" fill="none" opacity="0.2" stroke-dasharray="4 6"/>
    </g>

    <!-- Connection nodes (triangle formation around S logo) -->
    <circle cx="200" cy="300" r="3.5" fill="#4DD9E8" opacity="0.7"/>
    <circle cx="600" cy="250" r="3.5" fill="#FF8A4C" opacity="0.7"/>
    <circle cx="550" cy="600" r="3.5" fill="#9B4FDE" opacity="0.7"/>

    <!-- Logo S icon, scaled and centered -->
    <g transform="translate(240, 220) scale(3.2)">
      <path
        d="M 75 10 L 25 10 C 12 10 5 20 5 32 C 5 44 12 54 25 54 L 75 54 C 88 54 95 64 95 76 C 95 88 88 98 75 98 L 25 98"
        stroke="#7B2FBE"
        stroke-width="8"
        stroke-linecap="round"
        fill="none"
      />
      <circle cx="75" cy="10" r="5" fill="#7B2FBE"/>
      <circle cx="25" cy="98" r="5" fill="#9B4FDE"/>
    </g>

    <!-- SR watermark in Outfit font -->
    <text
      x="400"
      y="750"
      font-family="'Outfit', system-ui, sans-serif"
      font-size="28"
      font-weight="700"
      letter-spacing="6"
      fill="#888888"
      text-anchor="middle"
      opacity="0.4"
    >SR</text>
  </g>

  <!-- Purple border ring (outside clip, rendered on top) -->
  <circle cx="400" cy="400" r="390" fill="none" stroke="#7B2FBE" stroke-width="6" opacity="0.8"/>

</svg>
