<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Sameer Automations Profile Picture">
  <title>Sameer Automations</title>

  <defs>
    <!-- Radial gradient for dark background depth -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
    <!-- Purple inner glow behind the S -->
    <radialGradient id="sGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="400" cy="400" r="400"/>
    </clipPath>
  </defs>

  <!-- Circular background -->
  <circle cx="400" cy="400" r="400" fill="url(#bgGrad)"/>

  <!-- Purple glow layer -->
  <ellipse cx="400" cy="400" rx="260" ry="260" fill="url(#sGlow)" clip-path="url(#circleClip)"/>

  <!-- Purple border ring -->
  <circle cx="400" cy="400" r="390" fill="none" stroke="#7B2FBE" stroke-width="6" opacity="0.8"/>

  <!-- ============================================================
       Logo S icon, scaled and centered in 800x800 canvas.
       Original viewBox: 100x108.
       Target render size: ~320px wide, ~346px tall.
       Scale factor: 320/100 = 3.2
       Centering: translate x = (800 - 320)/2 = 240
                  translate y = (800 - 346)/2 = 227
  ============================================================ -->
  <g transform="translate(240, 220) scale(3.2)">
    <path
      d="M 75 10 L 25 10 C 12 10 5 20 5 32 C 5 44 12 54 25 54 L 75 54 C 88 54 95 64 95 76 C 95 88 88 98 75 98 L 25 98"
      stroke="#7B2FBE"
      stroke-width="8"
      stroke-linecap="round"
      fill="none"
    />
    <circle cx="75" cy="10" r="5" fill="#7B2FBE"/>
    <circle cx="25" cy="98" r="5" fill="#9B4FDE"/>
  </g>

  <!-- Small "SA" initials fallback text — hidden at full size, useful at small sizes -->
  <!-- Positioned at bottom-center as subtle branding anchor -->
  <text
    x="400"
    y="750"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="28"
    font-weight="600"
    letter-spacing="6"
    fill="#888888"
    text-anchor="middle"
    opacity="0.6"
  >SAMEER AUTOMATIONS</text>

</svg>
