<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Sameer Automations icon">
  <title>Sameer Automations</title>
  <defs>
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"></feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.302  0 0 0 0 0.851  0 0 0 0 0.910  0 0 0 0.8 0" result="cyan"></feColorMatrix>
      <feMerge>
        <feMergeNode in="cyan"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  
  <path d="M 80 20&#xA;       C 40 20, 20 20, 20 40&#xA;       C 20 60, 80 40, 80 60&#xA;       C 80 80, 60 80, 20 80" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none"></path>

  
  <circle cx="80" cy="20" r="6" fill="#FFFFFF" filter="url(#coreGlow)"></circle>
  <circle cx="80" cy="20" r="2" fill="#31D8FE" opacity="0.85"></circle>

  
  <circle cx="20" cy="80" r="6" fill="#FFFFFF" filter="url(#coreGlow)"></circle>
  <circle cx="20" cy="80" r="2" fill="#31D8FE" opacity="0.85"></circle>
</svg>